<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0" 
  />

  <title>Aurellys Cafe</title>

  <!-- PWA -->

  <link 
    rel="manifest" 
    href="manifest.json" 
  />

  <meta 
    name="theme-color" 
    content="#111827" 
  />

  <link 
    rel="apple-touch-icon" 
    href="images/aurellyslogo.png" 
  />

  <!-- CSS -->

  <link 
    rel="stylesheet" 
    href="style.css" 
  />

</head>

<body>

  <!-- HEADER -->

  <header class="hero">

    <img 
      src="images/aurellyslogo.png" 
      alt="Aurellys Cafe Logo"
      class="logo"
    />

  </header>

  <!-- SEARCH -->

  <section class="search-section">

    <input 
      type="text" 
      id="searchInput"
      placeholder="Cari menu..."
    />

  </section>

  <!-- CATEGORY -->

  <section class="categories">

    <button class="category-btn active">
      Semua
    </button>

    <button class="category-btn">
      Coffee
    </button>

    <button class="category-btn">
      Non Coffee
    </button>

    <button class="category-btn">
      Food
    </button>

  </section>

  <!-- MENU -->

  <main 
    class="menu-container" 
    id="menuContainer"
  >

  </main>

  <!-- WHATSAPP -->

  <a 
    href="#"
    class="wa-float"
    target="_blank"
  >
    Pesan via WhatsApp
  </a>

  <!-- SCRIPT -->

  <script src="script.js"></script>

  <!-- PWA REGISTER -->

  <script>

    if ("serviceWorker" in navigator) {

      window.addEventListener(
        "load",
        () => {

          navigator.serviceWorker.register(
            "./service-worker.js"
          );

        }
      );

    }

  </script>

</body>
</html>
