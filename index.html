<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aurellys Cafe</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
<header class="hero">

 <img 
  src="images/aurellyslogo.png" 
  alt="Aurellys Cafe Logo"
  class="logo"
/>

</header>

  <!-- SEARCH -->
  <section class="search-section">
    <input 
      type="text" 
      id="searchInput"
      placeholder="Cari menu..."
    />
  </section>

  <!-- CATEGORY -->
  <section class="categories">
    <button class="category-btn active">
      Semua
    </button>

    <button class="category-btn">
      Coffee
    </button>

    <button class="category-btn">
      Non Coffee
    </button>

    <button class="category-btn">
      Food
    </button>
  </section>

  <!-- MENU CONTAINER -->
  <main class="menu-container" id="menuContainer">

  </main>

  <!-- WHATSAPP FLOAT -->
  <a 
    href="https://wa.me/6281234567890"
    class="wa-float"
    target="_blank"
  >
    Pesan via WhatsApp
  </a>

  <script src="script.js"></script>

</body>
</html>
